<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/Logo2.svg">
    <title>{{ page.title }}</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (theme === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-mode');
          }
        } catch (e) {
          /* ignore access errors */
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/config.js"></script>
</head>
<body>
    {% include header.html %}
    {% include nav.html %}
    <script>
      (function(){
        var btn = document.getElementById('theme-toggle');
        if (btn) {
          btn.textContent = document.documentElement.classList.contains('dark-mode') ? '☀️' : '🌙';
        }
      })();
    </script>
    
    <main>
        {{ content }}
    </main>
    
    {% include footer.html %}
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/slideshow.js"></script>
</body>
</html>
