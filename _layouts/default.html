<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <!-- inline theme check: applies dark-mode class before CSS loads to avoid flash -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (theme === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-mode');
          }
        } catch (e) {
          /* ignore access errors */
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/config.js"></script>
</head>
<body>
    {% include header.html %}
    {% include nav.html %}
    
    <main>
        {{ content }}
    </main>
    
    {% include footer.html %}
    <script src="/assets/js/lastupdate.js"></script>
    <script src="/assets/js/theme.js"></script>
</body>
</html>
