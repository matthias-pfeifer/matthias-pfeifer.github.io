<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="white"/>

  <!-- Group everything so we can rotate it -->
  <g transform="rotate(30,32,32)"> <!-- rotate(angle, cx, cy) -->
    <!-- Top cone edges -->
    <line x1="32" y1="32" x2="16" y2="16" stroke="#0059b3" stroke-width="3.0" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="48" y2="16" stroke="#0059b3" stroke-width="3.0" stroke-linecap="round"/>

    <!-- Bottom cone edges -->
    <line x1="32" y1="32" x2="16" y2="48" stroke="#0059b3" stroke-width="3.0" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="48" y2="48" stroke="#0059b3" stroke-width="3.0" stroke-linecap="round"/>

    <!-- Elliptical rims for 3D effect -->
    <ellipse cx="32" cy="15" rx="16.3" ry="5" fill="none" stroke="#0059b3" stroke-width="3.0"/>
    <ellipse cx="32" cy="49" rx="16.3" ry="5" fill="none" stroke="#0059b3" stroke-width="3.0"/>
  </g>
</svg>