<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - [YOUR NAME]</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <div id="nav-placeholder"></div>
    
    <main>
        <!-- CONTACT SECTION -->
        <section id="contact">
            <h2>Contact</h2>
            <div class="contact-info">
                <p><strong>Email:</strong> <a href="mailto:[your-email]">[your-email]</a></p>
                <p><strong>Office:</strong> [University name], [Building], Room [number]</p>
                <p><strong>Phone:</strong> [Your phone - optional]</p>
            </div>
        </section>

        <!-- LINKS & RESOURCES (optional move here) -->
        <section id="links">
            <h2>Links & Resources</h2>
            <p>
                <a href="[Google Scholar URL]">Google Scholar</a><br>
                <a href="[arXiv URL]">arXiv</a><br>
                <a href="[ORCID URL]">ORCID</a><br>
                <a href="[GitHub URL]">GitHub</a><br>
                <a href="[Your CV]">Curriculum Vitae (PDF)</a>
            </p>
        </section>
    </main>
    
    <div id="footer-placeholder"></div>
    <script src="config.js"></script>
    <script src="includes.js"></script>
    <script src="lastupdate.js"></script>
    <script src="theme.js"></script>
</body>
</html>
