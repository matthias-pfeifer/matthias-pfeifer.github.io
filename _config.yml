# Jekyll site configuration
title: "Matthias Pfeifer"
subtitle: "Doctoral Candidate at TUM"
description: "Academic website for Matthias Pfeifer"
baseurl: ""
url: "https://matthias-pfeifer.github.io"

# Build settings
theme: null
plugins: []

# Exclude files from build
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .git

# Keep original file extensions
keep_files:
  - assets